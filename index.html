<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA v7 — Now Playing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'DM Sans',sans-serif;width:100vw;height:100vh;}
canvas{display:block;width:100%;height:100%;cursor:default;}
canvas.hovering{cursor:pointer;}
#ui{position:fixed;inset:0;pointer-events:none;}
.app-name{position:fixed;top:22px;left:28px;font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:rgba(255,255,255,.85);letter-spacing:.04em;}
.mood-tag{position:fixed;top:22px;right:28px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);padding:5px 12px;border-radius:20px;border:.5px solid rgba(255,255,255,.1);transition:color 2s,border-color 2s;}
.hint{position:fixed;top:22px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.18);pointer-events:none;transition:opacity .4s;white-space:nowrap;}
.right-panel{position:fixed;bottom:160px;right:28px;display:flex;flex-direction:column;gap:6px;pointer-events:all;}
.panel-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.18);text-align:center;margin-bottom:2px;}
.panel-divider{height:.5px;background:rgba(255,255,255,.08);margin:4px 0;}
.icon-btn{width:36px;height:36px;border-radius:50%;border:.5px solid rgba(255,255,255,.15);background:rgba(0,0,0,.4);color:rgba(255,255,255,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:14px;backdrop-filter:blur(6px);line-height:1;}
.icon-btn:hover{color:#fff;border-color:rgba(255,255,255,.4);}
.icon-btn.active{color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.5);}
.icon-btn.tod-active{color:#ffdd88;border-color:#ffdd8855;background:rgba(255,220,100,.08);}
.now-badge{position:fixed;bottom:145px;left:28px;display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28);}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:#1DB954;box-shadow:0 0 8px #1DB954;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.spotify-btn{position:fixed;top:62px;right:28px;display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:20px;border:.5px solid rgba(29,185,84,.4);background:rgba(29,185,84,.08);color:rgba(29,185,84,.8);font-size:11px;letter-spacing:.05em;cursor:pointer;pointer-events:all;transition:all .25s;backdrop-filter:blur(6px);}
.spotify-btn:hover{background:rgba(29,185,84,.18);color:#1DB954;}
.spotify-btn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0;}
.player{position:fixed;bottom:0;left:0;right:0;padding:0 28px 26px;background:linear-gradient(transparent,rgba(0,0,0,.93) 40%);pointer-events:all;}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ptime{font-size:11px;color:rgba(255,255,255,.3);min-width:34px;}
.ptime:last-child{text-align:right;}
.pbar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;}
.pfill{height:100%;border-radius:2px;width:0%;transition:background 2.5s ease;}
.controls-row{display:flex;align-items:center;justify-content:space-between;}
.meta{display:flex;align-items:center;gap:14px;flex:1;min-width:0;}
.art{width:52px;height:52px;border-radius:7px;flex-shrink:0;transition:background 2.5s ease;box-shadow:0 4px 24px rgba(0,0,0,.7);background-size:cover;background-position:center;}
.metainfo{min-width:0;flex:1;}
.tname{font-family:'Playfair Display',serif;font-size:16px;color:#fff;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tartist{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}
.btns{display:flex;align-items:center;gap:8px;}
.btn{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.btn:hover{background:rgba(255,255,255,.15);color:#fff;transform:scale(1.06);}
.btn.play{width:46px;height:46px;background:rgba(255,255,255,.14);}
.btn svg{width:18px;height:18px;fill:currentColor;pointer-events:none;}
.btn.play svg{width:22px;height:22px;}
.toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;border:.5px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap;}
.toast.show{opacity:1;}
#sp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);}
#sp-overlay.show{display:flex;}
.sp-card{background:#111;border:.5px solid rgba(255,255,255,.1);border-radius:16px;padding:36px;max-width:380px;width:90%;text-align:center;}
.sp-card h2{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;color:#fff;margin-bottom:8px;}
.sp-card p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:28px;}
.sp-go{display:inline-flex;align-items:center;gap:10px;background:#1DB954;color:#000;font-size:13px;font-weight:500;padding:13px 28px;border-radius:30px;border:none;cursor:pointer;transition:all .2s;width:100%;justify-content:center;}
.sp-go:hover{background:#1ed760;}
.sp-go svg{width:18px;height:18px;fill:currentColor;}
.sp-dismiss{margin-top:14px;font-size:11px;color:rgba(255,255,255,.25);cursor:pointer;}
.sp-dismiss:hover{color:rgba(255,255,255,.5);}
.sp-status{margin-top:16px;font-size:12px;color:rgba(255,255,255,.35);min-height:18px;}
#loading{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .8s;z-index:300;}
.l-name{font-family:'Playfair Display',serif;font-style:italic;font-size:32px;color:rgba(255,255,255,.85);}
.l-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.25);}
</style>
</head>
<body>
<div id="loading"><div class="l-name">aura</div><div class="l-sub">warming up the room...</div></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="app-name">aura</div>
  <div class="mood-tag" id="mood">— —</div>
  <button class="spotify-btn" id="sp-btn">
    <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    <span id="sp-btn-text">Connect Spotify</span>
  </button>
  <div class="hint" id="hint">click objects in the room to interact</div>
  <div class="right-panel">
    <div class="panel-label">View</div>
    <button class="icon-btn active" id="cam0">⬡</button>
    <button class="icon-btn" id="cam1">▣</button>
    <button class="icon-btn" id="cam2">◧</button>
    <button class="icon-btn" id="cam3">◎</button>
    <div class="panel-divider"></div>
    <div class="panel-label">Time</div>
    <button class="icon-btn" id="tod0">☀</button>
    <button class="icon-btn tod-active active" id="tod1">🌆</button>
    <button class="icon-btn" id="tod2">🌙</button>
  </div>
  <div class="now-badge"><div class="pulse-dot"></div><span id="now-label">Demo Mode</span></div>
  <div class="player">
    <div class="progress-row">
      <span class="ptime" id="tc">0:00</span>
      <div class="pbar" id="pbar"><div class="pfill" id="pfill"></div></div>
      <span class="ptime" id="tt">0:00</span>
    </div>
    <div class="controls-row">
      <div class="meta">
        <div class="art" id="art"></div>
        <div class="metainfo">
          <div class="tname" id="tname">—</div>
          <div class="tartist" id="tartist">—</div>
        </div>
      </div>
      <div class="btns">
        <button class="btn" id="bprev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button class="btn play" id="bplay"><svg viewBox="0 0 24 24" id="picon"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="btn" id="bnext"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg></button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="sp-overlay">
  <div class="sp-card">
    <h2>Connect to Spotify</h2>
    <p>Link your Spotify account so AURA reacts to whatever you're actually playing — album art, mood, energy, all live.</p>
    <button class="sp-go" id="sp-auth-btn">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Connect with Spotify
    </button>
    <div class="sp-status" id="sp-status"></div>
    <div class="sp-dismiss" id="sp-dismiss">Stay in demo mode</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SPOTIFY ──────────────────────────────────────────────────────────────────
var SPOTIFY_CLIENT_ID='9c842767f20b4320bfd327bb3e201023';
var SPOTIFY_REDIRECT_URI='https://aura-rouge-omega.vercel.app';
var SPOTIFY_SCOPES='user-read-currently-playing user-read-playback-state user-modify-playback-state';
var spotifyToken=null,spotifyConnected=false,spotifyPollInterval=null,spotifyCurrentTrackId=null;
function genRandom(n){var t='',p='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';for(var i=0;i<n;i++)t+=p[Math.floor(Math.random()*p.length)];return t;}
async function genChallenge(v){var d=new TextEncoder().encode(v),h=await crypto.subtle.digest('SHA-256',d);return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function startAuth(){if(SPOTIFY_CLIENT_ID==='YOUR_CLIENT_ID_HERE'){document.getElementById('sp-status').textContent='Add your Client ID first!';return;}var v=genRandom(128),c=await genChallenge(v);localStorage.setItem('sp_v',v);var p=new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,response_type:'code',redirect_uri:SPOTIFY_REDIRECT_URI,scope:SPOTIFY_SCOPES,code_challenge_method:'S256',code_challenge:c});window.location='https://accounts.spotify.com/authorize?'+p;}
async function exchangeToken(code){var v=localStorage.getItem('sp_v');var b=new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,grant_type:'authorization_code',code:code,redirect_uri:SPOTIFY_REDIRECT_URI,code_verifier:v});var r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:b.toString()});var d=await r.json();if(d.access_token){spotifyToken=d.access_token;localStorage.setItem('sp_token',spotifyToken);localStorage.setItem('sp_expiry',Date.now()+d.expires_in*1000);if(d.refresh_token)localStorage.setItem('sp_refresh',d.refresh_token);window.history.replaceState({},'',window.location.pathname);onConnected();}}
async function refreshToken(){var rf=localStorage.getItem('sp_refresh');if(!rf)return false;var b=new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,grant_type:'refresh_token',refresh_token:rf});var r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:b.toString()});var d=await r.json();if(d.access_token){spotifyToken=d.access_token;localStorage.setItem('sp_token',spotifyToken);localStorage.setItem('sp_expiry',Date.now()+d.expires_in*1000);return true;}return false;}
async function getToken(){if(Date.now()>parseInt(localStorage.getItem('sp_expiry')||0)-60000)if(!await refreshToken())return null;return localStorage.getItem('sp_token');}
function extractColor(url,cb){var img=new Image();img.crossOrigin='anonymous';img.onload=function(){var cv=document.createElement('canvas');cv.width=cv.height=50;var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,50,50);var d=ctx.getImageData(0,0,50,50).data,r=0,g=0,b=0,n=0;for(var i=0;i<d.length;i+=16){var br=(d[i]+d[i+1]+d[i+2])/3;if(br>20&&br<230){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}}cb(n?{r:Math.round(r/n),g:Math.round(g/n),b:Math.round(b/n)}:null);};img.onerror=function(){cb(null);};img.src=url;}
async function fetchPlaying(){var tk=await getToken();if(!tk)return;try{var r=await fetch('https://api.spotify.com/v1/me/player/currently-playing',{headers:{'Authorization':'Bearer '+tk}});if(r.status===204||r.status===404)return;if(r.status===401){spotifyConnected=false;return;}var d=await r.json();if(!d||!d.item)return;applySpotifyData(d);}catch(e){}}
async function fetchFeatures(id){var tk=await getToken();if(!tk)return null;try{var r=await fetch('https://api.spotify.com/v1/audio-features/'+id,{headers:{'Authorization':'Bearer '+tk}});return await r.json();}catch(e){return null;}}
async function applySpotifyData(data){
  var t=data.item,id=t.id;
  var isNewTrack=(id!==spotifyCurrentTrackId);

  // Always sync progress and play state regardless of whether track changed
  progress=data.progress_ms/1000;
  lastElapsed=null;
  if(data.is_playing&&!playing)startPlay();
  else if(!data.is_playing&&playing)stopPlay();

  if(!isNewTrack)return; // room visuals only update on track change
  spotifyCurrentTrackId=id;

  var artist=t.artists.map(function(a){return a.name;}).join(', ');
  var art=t.album.images[0]?t.album.images[0].url:'';
  document.getElementById('tname').textContent=t.name;
  document.getElementById('tartist').textContent=artist.toUpperCase();
  document.getElementById('tt').textContent=fmt(Math.round(t.duration_ms/1000));
  document.getElementById('now-label').textContent='Now Playing';
  if(art){
    document.getElementById('art').style.backgroundImage='url('+art+')';
    document.getElementById('art').style.backgroundSize='cover';
    loadAlbumArtTexture(art);
  }
  var feat=await fetchFeatures(id);
  var energy=feat?feat.energy:0.5,valence=feat?feat.valence:0.5;
  currentEnergy=energy;
  document.getElementById('mood').textContent=getMood(energy,valence);
  if(energy<0.4&&valence<0.45)setWeather('rain');else if(energy>0.7&&valence>0.6)setWeather('clear');else setWeather('cloudy');
  setCatMood(energy);
  if(art)extractColor(art,function(col){if(!col)return;applyPalette(col.r,col.g,col.b,energy);});
}
function applyPalette(r,g,b,energy){
  var hex='#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
  // Derive dark bg/wall tones from album color
  var bgR=Math.round(r*.08),bgG=Math.round(g*.08),bgB=Math.round(b*.08);
  var wallR=Math.round(r*.12),wallG=Math.round(g*.12),wallB=Math.round(b*.12);
  colorState.bg.tgt.setRGB(bgR/255,bgG/255,bgB/255);
  colorState.tv.tgt.setRGB(r/255,g/255,b/255);
  colorState.ambient.tgt.setRGB(r/255*.18,g/255*.18,b/255*.18);
  colorState.lamp.tgt.setRGB(1.0, 0.85+g/1800, 0.55+b/1200); // keep lamp warm regardless
  floatState.ambientInt.tgt=0.4+energy*.9;
  floatState.lampInt.tgt=lampOn?(1.5+energy*2.5):0;
  floatState.tvInt.tgt=1.5+energy*2;
  floorMesh.material.color.setRGB(bgR/255*.9,bgG/255*.9,bgB/255*.9);
  wallBack.material.color.setRGB(wallR/255,wallG/255,wallB/255);
  wallLeft.material.color.setRGB(wallR/255,wallG/255,wallB/255);
  wallRight.material.color.setRGB(wallR/255,wallG/255,wallB/255);
  // Sync glow backlight colour to album palette
  tvGlowMat.emissive.setRGB(r/255*.5,g/255*.5,b/255*.5);
  tvGlowMat.color.setRGB(r/255*.3,g/255*.3,b/255*.3);
  // Only update screen emissive colour if no texture is loaded yet
  if(!tvScreenMat.map){
    tvScreenMat.color.setRGB(r/255*.4,g/255*.4,b/255*.4);
    tvScreenMat.emissive.setRGB(r/255*.5,g/255*.5,b/255*.5);
  } else {
    // Texture is loaded — just tint the emissive slightly with album colour
    tvScreenMat.emissive.setRGB(r/255*.15,g/255*.15,b/255*.15);
    tvScreenMat.emissiveIntensity=0.55;
  }
  for(var i=0;i<vizBars.length;i++){vizBars[i].mat.color.setRGB(r/255,g/255,b/255);vizBars[i].mat.emissive.setRGB(r/255,g/255,b/255);}
  document.getElementById('pfill').style.background=hex;
  document.getElementById('mood').style.color=hex;
  document.getElementById('mood').style.borderColor=hex+'55';
}
function loadAlbumArtTexture(url){
  if(!url||url===currentAlbumArtUrl)return;
  currentAlbumArtUrl=url;
  // Use an Image with crossOrigin first to ensure it's loaded correctly,
  // then hand off to TextureLoader via the same URL
  tvTexLoader.crossOrigin='anonymous';
  tvTexLoader.load(url,
    function(tex){
      // Flip so art is right-way up on the screen face
      tex.flipY=false;
      tex.encoding=THREE.sRGBEncoding;
      // Remove old texture to free memory
      if(tvScreenMat.map) tvScreenMat.map.dispose();
      tvScreenMat.map=tex;
      tvScreenMat.color.setHex(0xffffff); // let texture show at full colour
      tvScreenMat.emissiveMap=tex;
      tvScreenMat.emissiveIntensity=0.55; // screen glows the art
      tvScreenMat.needsUpdate=true;
    },
    undefined,
    function(){ /* fallback — keep colour wash if texture fails */ }
  );
}
function getMood(e,v){if(e>.7&&v>.6)return'euphoric';if(e>.7&&v<.4)return'intense';if(e<.4&&v>.6)return'dreamy';if(e<.4&&v<.4)return'melancholic';if(v>.7)return'warm';if(v<.3)return'brooding';return'chill';}
function onConnected(){spotifyConnected=true;document.getElementById('sp-btn-text').textContent='Connected';document.getElementById('sp-overlay').classList.remove('show');document.getElementById('now-label').textContent='Now Playing';fetchPlaying();spotifyPollInterval=setInterval(fetchPlaying,5000);}
function checkCallback(){var p=new URLSearchParams(window.location.search),code=p.get('code');if(code){exchangeToken(code);return;}var stored=localStorage.getItem('sp_token'),exp=parseInt(localStorage.getItem('sp_expiry')||0);if(stored&&exp>Date.now()){spotifyToken=stored;onConnected();}}

// ─── IDLE STATE (shown before Spotify connects) ───────────────────────────────
// Default room palette — neutral deep purple, cozy dusk feel
var idleState={
  mood:'waiting...', energy:.5, weather:'cloudy',
  bg:0x0a0612, ambientCol:0x4422bb, ambientInt:.6,
  lampCol:0xffcc44, lampInt:2.5, tvCol:0x6644aa, tvInt:1.5,
  floorHex:0x130a20, wallHex:0x0d0716,
  pillow:0x5a3050, vinyl:0x3a0a5a
};
// Minimal stub so references to tracks[curTrack].energy don't blow up
var tracks=[idleState];
var curTrack=0;

// ─── THREE SETUP ──────────────────────────────────────────────────────────────
var canvas=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(42,window.innerWidth/window.innerHeight,0.1,200);
window.addEventListener('resize',function(){renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();});
renderer.setSize(window.innerWidth,window.innerHeight);

var raycaster=new THREE.Raycaster();

var weatherParticles=[];

var weatherGroup=new THREE.Group();scene.add(weatherGroup);

// Rain spawns in a volume outside the window (x < -8.9, behind the wall)
function buildRaindrops(){
  clearWeatherParticles();
  var rainMat=new THREE.MeshStandardMaterial({color:0x99bbdd,roughness:1,transparent:true,opacity:.5});
  for(var ri=0;ri<50;ri++){
    var drop=mkMesh(new THREE.CylinderGeometry(.008,.008,.15,3),rainMat);
    resetRaindrop(drop,true);
    weatherGroup.add(drop);
    weatherParticles.push({mesh:drop,speed:.055+Math.random()*.07,type:'rain'});
  }
}
function resetRaindrop(m,rnd){
  // x just outside window, z within window width, y from top down
  m.position.set(
    -10+Math.random()*.5,
    rnd?(1+Math.random()*5):5.5,
    -2.0+Math.random()*2.0
  );
  m.rotation.z=.1;
}
function buildStars(){
  clearWeatherParticles();
  for(var sti=0;sti<28;sti++){
    var sm=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:1});
    var star=mkMesh(new THREE.SphereGeometry(.018+Math.random()*.012,4,4),sm);
    // Scatter on the sky plane behind the window
    star.position.set(-9.5+Math.random()*.3,1.8+Math.random()*3.2,-2.1+Math.random()*2.2);
    weatherGroup.add(star);
    weatherParticles.push({mesh:star,phase:Math.random()*Math.PI*2,type:'star'});
  }
}
function buildCloudy(){
  clearWeatherParticles();
  var cloudMat=new THREE.MeshStandardMaterial({color:0x445566,roughness:1,transparent:true,opacity:.35});
  for(var cli=0;cli<6;cli++){
    var cl=mkMesh(new THREE.SphereGeometry(.18+Math.random()*.1,5,4),cloudMat);
    cl.scale.set(1.4+Math.random(),.5,1);
    cl.position.set(-9.5,3.2+Math.random()*.6,-1+Math.random()*1.6-0.8);
    weatherGroup.add(cl);
    weatherParticles.push({mesh:cl,phase:Math.random()*Math.PI*2,type:'cloud'});
  }
}
function clearWeatherParticles(){for(var i=0;i<weatherParticles.length;i++)weatherGroup.remove(weatherParticles[i].mesh);weatherParticles=[];}
function setWeather(w){currentWeather=w;if(w==='rain')buildRaindrops();else if(w==='clear')buildStars();else buildCloudy();}

// ─── STEAM PARTICLES from mug ─────────────────────────────────────────────────
var steamParticles=[];
for(var spi=0;spi<8;spi++){
  var sp=mkMesh(new THREE.SphereGeometry(.018,4,4),new THREE.MeshStandardMaterial({color:0xffffff,roughness:.5,transparent:true,opacity:.2,emissive:0xffffff,emissiveIntensity:.2}));
  sp.position.set(.2+(Math.random()-.5)*.05,.78+spi*.08,.65);
  sp.userData={phase:Math.random()*Math.PI*2,idx:spi};
  scene.add(sp);steamParticles.push(sp);
}

// ─── INTERACTION FUNCTIONS ────────────────────────────────────────────────────
var toastTimer=null;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show');},1800);}
function toggleLamp(){
  lampOn=!lampOn;
  floatState.lampInt.tgt=lampOn?tracks[curTrack].lampInt:0;
  lampGlowDisk.material.emissiveIntensity=lampOn?3.0:0;
  lampBulb.material.emissiveIntensity=lampOn?4.0:0;
  showToast(lampOn?'Lamp on':'Lamp off');
}
function toggleCandle(){candleOn=!candleOn;flameMesh.visible=candleOn;flameInner.visible=candleOn;showToast(candleOn?'Candle lit':'Candle snuffed');}
function toggleSideLamp(){
  sideLampOn=!sideLampOn;
  sideLight.intensity=sideLampOn?.7:0;
  sideBulb.material.emissiveIntensity=sideLampOn?4.0:0;
  sideGlowDisk.material.emissiveIntensity=sideLampOn?2.5:0;
  showToast(sideLampOn?'Side lamp on':'Side lamp off');
}

function toggleTVDisplay(){
  tvDisplayMode=(tvDisplayMode+1)%2;
  var on=tvDisplayMode===0;
  tvScreenMat.emissiveIntensity=on?(tvScreenMat.map?0.55:0.4):0;
  if(!on){tvScreenMat.color.setHex(0x000000);}
  else if(tvScreenMat.map){tvScreenMat.color.setHex(0xffffff);}
  tvGlowMat.emissiveIntensity=on?0.25:0;
  floatState.tvInt.tgt=on?currentEnergy*2+1.5:0;
  showToast(on?'TV on':'TV off');
}

function cycleVizMode(){
  vizMode=(vizMode+1)%3;
  var labels=['Bars','Spectrogram','Off'];
  for(var i=0;i<vizBars.length;i++) vizBars[i].mesh.visible=(vizMode===0);
  for(var i=0;i<specBars.length;i++) specBars[i].mesh.visible=(vizMode===1);
  showToast('Visualizer: '+labels[vizMode]);
}

function setCatMood(energy){
  if(energy<0.4){
    catMoodState='sleep';
    catBodyMesh.scale.set(1.1,.5,1.4);
    catHeadMesh.position.set(.18,.16,-.12);
    for(var i=0;i<eyeMats.length;i++){eyeMats[i].emissive.setHex(0x112211);eyeMats[i].emissiveIntensity=.05;}
    showToast('The cat is sleeping...');
  } else if(energy>0.7){
    catMoodState='alert';
    catBodyMesh.scale.set(1.1,.72,1.2);
    catHeadMesh.position.set(.24,.26,-.1);
    for(var i=0;i<eyeMats.length;i++){eyeMats[i].emissive.setHex(0x33ff77);eyeMats[i].emissiveIntensity=.8;}
    showToast('Cat is vibing!');
  } else {
    catMoodState='idle';
    catBodyMesh.scale.set(1.1,.6,1.3);
    catHeadMesh.position.set(.2,.22,-.12);
    for(var i=0;i<eyeMats.length;i++){eyeMats[i].emissive.setHex(0x22ff55);eyeMats[i].emissiveIntensity=.4;}
  }
}

function applyTimeOfDay(idx){
  timeOfDay=idx;
  var s=todSettings[idx];
  colorState.bg.tgt.setHex(s.sky);
  windowLight.intensity=s.windowInt;moonLight.intensity=s.moonInt;ceilLight.intensity=s.ceilInt;
  // Update sky plane colour to match time
  if(idx===0) skyPlane.material.color.setHex(0x0d1a33);
  else if(idx===1) skyPlane.material.color.setHex(0x1a0808);
  else skyPlane.material.color.setHex(0x010308);
  skyPlane.material.emissive.setHex(skyPlane.material.color.getHex());
  for(var j=0;j<3;j++){document.getElementById('tod'+j).classList.toggle('tod-active',j===idx);document.getElementById('tod'+j).classList.toggle('active',j===idx);}
  showToast(s.label.charAt(0).toUpperCase()+s.label.slice(1));
}

// ─── IDLE STATE APPLY (room palette before Spotify connects) ──────────────────
function applyIdleState(){
  var t=idleState;
  colorState.bg.tgt.setHex(t.bg);
  colorState.ambient.tgt.setHex(t.ambientCol);colorState.lamp.tgt.setHex(t.lampCol);colorState.tv.tgt.setHex(t.tvCol);
  floatState.ambientInt.tgt=t.ambientInt;floatState.lampInt.tgt=lampOn?t.lampInt:0;floatState.tvInt.tgt=tvDisplayMode===0?t.tvInt:0;
  floorMesh.material.color.setHex(t.floorHex);wallBack.material.color.setHex(t.wallHex);wallLeft.material.color.setHex(t.wallHex);wallRight.material.color.setHex(t.wallHex);
  // TV screen — idle glow only, no texture yet
  tvScreenMat.emissive.setHex(t.tvCol);
  tvScreenMat.emissiveIntensity=0.4;
  if(!tvScreenMat.map) tvScreenMat.color.setHex(t.tvCol);
  tvGlowMat.emissive.setHex(t.tvCol);tvGlowMat.color.setHex(t.tvCol);
  vinylLabel.material.color.setHex(t.vinyl);pillowMesh.material.color.setHex(t.pillow);
  for(var i=0;i<vizBars.length;i++){vizBars[i].mat.color.setHex(t.tvCol);vizBars[i].mat.emissive.setHex(t.tvCol);}
  document.getElementById('tname').textContent='—';
  document.getElementById('tartist').textContent='Connect Spotify to begin';
  document.getElementById('mood').textContent=t.mood;
  document.getElementById('mood').style.color='rgba(255,255,255,.3)';
  document.getElementById('mood').style.borderColor='rgba(255,255,255,.1)';
  document.getElementById('art').style.background='#111';
  document.getElementById('art').style.backgroundImage='none';
  setWeather(t.weather);setCatMood(t.energy);
}

// ─── PLAYBACK ─────────────────────────────────────────────────────────────────
var playing=false,progress=0,lastElapsed=null,barTimer=null;
var vinylAngle=0,flameT=0,camDriftT=0,steamT=0,catBobT=0;
var currentEnergy=0.5; // updated by Spotify, used by viz/steam

function startPlay(){playing=true;document.getElementById('picon').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';lastElapsed=null;scheduleBars();}
function stopPlay(){playing=false;document.getElementById('picon').innerHTML='<path d="M8 5v14l11-7z"/>';clearTimeout(barTimer);}
function scheduleBars(){
  if(!playing)return;
  for(var i=0;i<vizBars.length;i++) vizBars[i].tgt=.06+Math.random()*.7*currentEnergy;
  for(var i=0;i<specBars.length;i++) specBars[i].tgt=.05+Math.random()*.8*currentEnergy*(1+Math.sin(i*.4)*.3);
  barTimer=setTimeout(scheduleBars,75+Math.random()*40);
}
function fmt(s){var m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
var clock=new THREE.Clock();
function render(){
  requestAnimationFrame(render);
  var delta=clock.getDelta(),elapsed=clock.getElapsedTime();
  var ls=Math.min(delta*1.4,.06);

  for(var k in colorState) colorState[k].cur.lerp(colorState[k].tgt,ls*1.5);
  for(var fk in floatState) floatState[fk].cur=lerpF(floatState[fk].cur,floatState[fk].tgt,ls*1.5);
  scene.background=colorState.bg.cur;
  ambientLight.color.copy(colorState.ambient.cur);ambientLight.intensity=floatState.ambientInt.cur;
  lampLight.color.copy(colorState.lamp.cur);lampLight.intensity=floatState.lampInt.cur;
  tvLight.color.copy(colorState.tv.cur);tvLight.intensity=floatState.tvInt.cur;
  ceilLight.color.copy(colorState.ambient.cur);

  // Standard viz bars
  if(vizMode===0){
    for(var bi2=0;bi2<vizBars.length;bi2++){
      var vb=vizBars[bi2];vb.cur=lerpF(vb.cur,vb.tgt,.22);
      vb.mesh.scale.y=Math.max(.1,vb.cur/.12);vb.mesh.position.y=.6+vb.cur*.5;
    }
  }
  // Spectrogram bars — grow from bottom, rainbow colours
  if(vizMode===1){
    for(var sbi2=0;sbi2<specBars.length;sbi2++){
      var sb=specBars[sbi2];sb.cur=lerpF(sb.cur,sb.tgt,.2);
      sb.mesh.scale.y=Math.max(.1,sb.cur/.08);sb.mesh.position.y=.58+sb.cur*.5;
      sb.mat.emissiveIntensity=.6+sb.cur*1.5;
    }
  }

  // Vinyl spin
  if(playing) vinylAngle+=delta*1.6;
  vinylDisk.rotation.y=vinylAngle;vinylLabel.rotation.y=vinylAngle;

  // Candle flicker
  flameT+=delta;
  if(candleOn){
    var flick=.8+Math.sin(flameT*13.1)*.35+Math.sin(flameT*7.3)*.2;
    flameMesh.scale.y=flick;flameMesh.scale.x=.7+Math.sin(flameT*11)*.25;
    flameInner.scale.y=flick*.8;flameInner.scale.x=.6+Math.sin(flameT*13)*.2;
    candleLight.intensity=.25+flick*.5;
  } else {candleLight.intensity=0;}

  // Steam
  steamT+=delta;
  var spd=.35+currentEnergy*.75;
  for(var spi2=0;spi2<steamParticles.length;spi2++){
    var sp2=steamParticles[spi2];
    sp2.position.y+=delta*spd*(1-sp2.userData.idx*.04);
    sp2.position.x=.2+Math.sin(steamT*1.4+sp2.userData.phase)*.035;
    var life=(sp2.position.y-.78)/.65;
    sp2.material.opacity=Math.max(0,.22*(1-life));
    if(sp2.position.y>1.48){sp2.position.set(.2+(Math.random()-.5)*.04,.78,.65);sp2.userData.phase=Math.random()*Math.PI*2;}
  }

  // Cat bob
  catBobT+=delta;
  var catBob=catMoodState==='alert'?Math.sin(catBobT*3)*.025:Math.sin(catBobT*.9)*.006;
  catGroup.position.y=.08+catBob;
  catGroup.rotation.y=catMoodState==='alert'?Math.sin(catBobT*1.5)*.08:0;

  // Weather
  for(var wi=0;wi<weatherParticles.length;wi++){
    var wp=weatherParticles[wi];
    if(wp.type==='rain'){
      wp.mesh.position.y-=wp.speed;
      wp.mesh.position.z+=wp.speed*.15;
      if(wp.mesh.position.y<.5) resetRaindrop(wp.mesh,false);
    } else if(wp.type==='star'){
      wp.phase+=delta;
      wp.mesh.material.emissiveIntensity=.4+Math.sin(wp.phase*1.8)*.35+(playing?Math.sin(wp.phase*7)*.25:0);
    } else if(wp.type==='cloud'){
      wp.phase+=delta*.15;
      wp.mesh.position.z+=Math.sin(wp.phase)*.001;
    }
  }

  // Side lamp subtle flicker (only when on)
  if(sideLampOn) sideLight.intensity=.55+Math.sin(elapsed*.4)*.1;

  // Progress — advances locally between Spotify polls (poll every 5s, this fills the gap)
  if(playing&&spotifyConnected){
    if(lastElapsed===null)lastElapsed=elapsed;
    var trackDur=parseInt(document.getElementById('tt').textContent.split(':')[0])*60+parseInt(document.getElementById('tt').textContent.split(':')[1]||0);
    progress+=elapsed-lastElapsed;lastElapsed=elapsed;
    if(trackDur>0){
      document.getElementById('pfill').style.width=Math.min(100,(progress/trackDur)*100)+'%';
      document.getElementById('tc').textContent=fmt(Math.floor(progress));
    }
  } else {lastElapsed=null;}

  // Camera
  var cp=camPositions[activeCam];
  camDriftT+=delta*.055;
  camTgt.pos.lerp(cp.pos,delta*2.2);camTgt.tgt.lerp(cp.target,delta*2.2);camTgt.fov=lerpF(camTgt.fov,cp.fov,delta*2.2);
  camera.position.set(camTgt.pos.x+Math.sin(camDriftT)*.15,camTgt.pos.y+Math.sin(camDriftT*1.3)*.08,camTgt.pos.z);
  camera.lookAt(camTgt.tgt);camera.fov=camTgt.fov;camera.updateProjectionMatrix();

  renderer.render(scene,camera);
}

// ─── MOUSE INTERACTION ────────────────────────────────────────────────────────
var hoverTarget=null;
canvas.addEventListener('mousemove',function(e){
  mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var found=false;
  for(var i=0;i<interactables.length;i++){if(raycaster.intersectObjects(interactables[i].meshes).length>0){found=true;hoverTarget=i;break;}}
  canvas.classList.toggle('hovering',found);
  if(!found)hoverTarget=null;
  var hint=document.getElementById('hint');
  if(hoverTarget!==null){hint.textContent=interactables[hoverTarget].label;hint.style.opacity='1';}
  else{hint.style.opacity='.16';hint.textContent='click objects in the room to interact';}
});
canvas.addEventListener('click',function(e){
  mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  for(var i=0;i<interactables.length;i++){if(raycaster.intersectObjects(interactables[i].meshes).length>0){interactables[i].onHit();break;}}
});

// ─── UI WIRING ────────────────────────────────────────────────────────────────
for(var ci2=0;ci2<4;ci2++){
  (function(idx){document.getElementById('cam'+idx).onclick=function(){activeCam=idx;for(var j=0;j<4;j++)document.getElementById('cam'+j).classList.toggle('active',j===idx);};})(ci2);
}
for(var ti=0;ti<3;ti++){(function(idx){document.getElementById('tod'+idx).onclick=function(){applyTimeOfDay(idx);};})(ti);}

// Playback buttons only do anything when Spotify is connected
document.getElementById('bplay').onclick=function(){if(!spotifyConnected)return;if(playing)stopPlay();else startPlay();};
document.getElementById('bnext').onclick=function(){/* Spotify handles next */};
document.getElementById('bprev').onclick=function(){/* Spotify handles prev */};
document.getElementById('pbar').onclick=function(e){/* progress driven by Spotify */};
document.getElementById('sp-btn').onclick=function(){document.getElementById('sp-overlay').classList.add('show');};
document.getElementById('sp-auth-btn').onclick=startAuth;
document.getElementById('sp-dismiss').onclick=function(){document.getElementById('sp-overlay').classList.remove('show');};

// ─── INIT ─────────────────────────────────────────────────────────────────────
applyIdleState();
applyTimeOfDay(1);
setWeather('cloudy');
render();checkCallback();
setTimeout(function(){var l=document.getElementById('loading');l.style.opacity='0';setTimeout(function(){l.style.display='none';},800);},800);
</script>
